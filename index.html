<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 5th Monthsary, My Love 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
    padding-top: 20px;
  }

  #intro {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    cursor: pointer;
    transition: opacity 1s ease;
  }

  #intro h1 {
    color: #ff9966;
    font-size: 1.8rem;
    text-shadow: 0 0 30px #ff6633;
    text-align: center;
    animation: pulse 2s infinite;
    margin-bottom: 10px;
    padding: 0 20px;
  }

  #intro p {
    color: #ffccaa;
    font-size: 0.95rem;
    opacity: 0.7;
    font-style: italic;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  #main {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding-bottom: 40px;
  }

  h1.title {
    color: #ff9966;
    font-size: 1.4rem;
    margin: 22px 0 4px;
    text-align: center;
    text-shadow: 0 0 20px #ff6633;
    letter-spacing: 2px;
  }

  h2.subtitle-top {
    color: #ffccaa;
    font-size: 0.95rem;
    margin-bottom: 14px;
    text-align: center;
    font-style: italic;
    text-shadow: 0 0 10px #ff6633;
  }

  #music-player {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,120,50,0.12);
    border: 1px solid rgba(255,120,50,0.3);
    border-radius: 50px;
    padding: 10px 22px;
    margin-bottom: 18px;
    backdrop-filter: blur(6px);
  }

  #play-btn {
    background: linear-gradient(135deg, #ff6633, #ff3366);
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 1.1rem;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px rgba(255,80,30,0.5);
    transition: transform 0.2s;
  }

  #play-btn:hover { transform: scale(1.1); }

  .song-info { display: flex; flex-direction: column; }

  .song-title {
    color: #ff9966;
    font-size: 0.85rem;
    font-weight: bold;
  }

  .song-sub {
    color: #ffccaa;
    font-size: 0.72rem;
    opacity: 0.7;
    font-style: italic;
  }

  .music-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 20px;
  }

  .bar {
    width: 4px;
    background: #ff6633;
    border-radius: 2px;
    animation: bounce-bar 0.8s ease infinite alternate;
  }

  .bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
  .bar:nth-child(2) { animation-delay: 0.15s; height: 14px; }
  .bar:nth-child(3) { animation-delay: 0.3s;  height: 10px; }
  .bar:nth-child(4) { animation-delay: 0.45s; height: 18px; }
  .bar:nth-child(5) { animation-delay: 0.6s;  height: 6px; }

  @keyframes bounce-bar {
    from { transform: scaleY(0.4); opacity: 0.5; }
    to   { transform: scaleY(1.2); opacity: 1; }
  }

  .bars-paused .bar { animation-play-state: paused; }

  /* ── PORTRAIT ── */
  #portrait-container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  .portrait {
    font-family: monospace;
    font-size: 5.5px;
    line-height: 5.5px;
    letter-spacing: -0.3px;
    word-spacing: -1px;
    text-align: justify;
    width: 480px;
    height: 620px;
    max-width: 90vw;
    overflow: hidden;
    display: block;

    background-image: url('elaiza.jpg');
    background-size: cover;
    background-position: center top;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  #typed-box {
    max-width: 500px;
    width: 92vw;
    margin-top: 24px;
    background: rgba(255,100,40,0.08);
    border: 1px solid rgba(255,120,50,0.25);
    border-radius: 16px;
    padding: 20px 22px;
    text-align: center;
  }

  #typed-text {
    color: #ffddbb;
    font-size: 0.92rem;
    line-height: 1.75;
    font-style: italic;
    min-height: 80px;
    text-shadow: 0 0 8px rgba(255,100,30,0.4);
  }

  #cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #ff9966;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .date-tag {
    color: #ff9966;
    font-size: 0.78rem;
    margin-top: 14px;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .hearts {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .heart {
    position: absolute;
    top: -20px;
    animation: fall linear infinite;
    opacity: 0.45;
  }

  @keyframes fall {
    0%   { top: -20px; opacity: 0.45; }
    100% { top: 100vh; opacity: 0; }
  }

  #main { position: relative; z-index: 1; }
</style>
</head>
<body>

<div id="intro" onclick="startExperience()">
  <h1>💕 For My Love, Elai 💕</h1>
  <p>Tap anywhere to open your gift...</p>
</div>

<div class="hearts" id="hearts"></div>

<div id="main">
  <h1 class="title">💕 Happy 5th Monthsary, Love 💕</h1>
  <h2 class="subtitle-top">— From the one who loves you most —</h2>

  <div id="music-player">
    <button id="play-btn" onclick="toggleMusic()">▶</button>
    <div class="song-info">
      <span class="song-title">🎵 Pag Ibig ng Ikaw at Ako</span>
      <span class="song-sub">Earl Agustin — Para sa iyo, Elai 💕</span>
    </div>
    <div class="music-bars bars-paused" id="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <div id="portrait-container">
    <div class="portrait" id="portrait"></div>
  </div>

  <div id="typed-box">
    <div id="typed-text"><span id="cursor"></span></div>
    <p class="date-tag">💕 October 12, 2025 → Forever 💕</p>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// ════════════════════════════════
//  INTRO
// ════════════════════════════════
function startExperience() {
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  setTimeout(() => {
    intro.style.display = 'none';
    document.getElementById('main').style.display = 'flex';

    // ✅ Small delay so browser renders #main first before filling portrait
    setTimeout(() => {
      buildPortrait();
    }, 100);

    startTyping();
    const music = document.getElementById('bg-music');
    music.play().then(() => {
      document.getElementById('play-btn').textContent = '⏸';
      document.getElementById('bars').classList.remove('bars-paused');
    }).catch(() => {});
  }, 1000);
}

// ════════════════════════════════
//  MUSIC
// ════════════════════════════════
function toggleMusic() {
  const music = document.getElementById('bg-music');
  const btn   = document.getElementById('play-btn');
  const bars  = document.getElementById('bars');
  if (music.paused) {
    music.play();
    btn.textContent = '⏸';
    bars.classList.remove('bars-paused');
  } else {
    music.pause();
    btn.textContent = '▶';
    bars.classList.add('bars-paused');
  }
}

// ════════════════════════════════
//  TEXT PORTRAIT
// ════════════════════════════════
function buildPortrait() {
  const portrait = document.getElementById('portrait');
  const message  = `HAPPY 5TH MONTHSARY ELAIZA I may not always say the perfect words but I am thankful every day that I have you Your smile makes my day better your love makes me stronger I am lucky to call you mine Happy Monthsary my love `;

  let text = '';
  for (let i = 0; i < 800; i++) {
    text += message;
  }
  portrait.textContent = text;

  // ✅ Force repaint so background-clip applies
  portrait.style.display = 'none';
  portrait.offsetHeight;
  portrait.style.display = 'block';
}

// ════════════════════════════════
//  TYPED MESSAGES
// ════════════════════════════════
const messages = [
  "My Love, Elai... 🥹",
  "From October 12, 2025 — you changed my world. 💕",
  "I love how you care for me and support me...",
  "You make every single day better, just by being you. ❤️",
  "When we talk, I feel the purest happiness.",
  "You understand me like no one else ever has.",
  "I miss you so much when you're not around. 🥺",
  "Our first kiss... that memory lives in my heart forever. 💋",
  "You are my peace, my joy, my favorite person. 🌟",
  "Happy 5th Monthsary, my love. I love you, Elai. 💕"
];

let msgIndex   = 0;
let charIdx    = 0;
let isDeleting = false;

function startTyping() { typeLoop(); }

function typeLoop() {
  const current = messages[msgIndex];
  const typedEl = document.getElementById('typed-text');

  if (!isDeleting) {
    charIdx++;
    typedEl.innerHTML = current.substring(0, charIdx) + '<span id="cursor"></span>';
    if (charIdx === current.length) {
      setTimeout(() => { isDeleting = true; typeLoop(); }, 2200);
      return;
    }
  } else {
    charIdx--;
    typedEl.innerHTML = current.substring(0, charIdx) + '<span id="cursor"></span>';
    if (charIdx === 0) {
      isDeleting = false;
      msgIndex   = (msgIndex + 1) % messages.length;
    }
  }

  setTimeout(typeLoop, isDeleting ? 28 : 58);
}

// ════════════════════════════════
//  FALLING HEARTS
// ════════════════════════════════
const heartsContainer = document.getElementById('hearts');
const heartSymbols    = ['💕','❤️','🥹','💖','💗','✨'];

for (let i = 0; i < 15; i++) {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.textContent             = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
  heart.style.left              = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (5 + Math.random() * 7) + 's';
  heart.style.animationDelay   = (Math.random() * 6) + 's';
  heart.style.fontSize          = (0.8 + Math.random() * 1.2) + 'rem';
  heartsContainer.appendChild(heart);
}
</script>
</body>
</html>
